name: Feature request
description: Suggest an enhancement or new capability for the `maven-upgrade-java-spring-boot` prompt
title: "[Feature]: <short summary>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to the **maven-upgrade-java-spring-boot** prompt.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I have searched [existing issues](https://github.com/CortexAIDevKit/maven-upgrade-java-spring-boot-prompt/issues) and this has not already been reported.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? Why does the current prompt not address it?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like the prompt to have.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or tools you considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Sample prompts, example inputs/outputs, links, or screenshots.
